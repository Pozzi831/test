<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экзамен: Алгоритмизация и программирование</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        #app {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            font-size: 1.5rem;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h2 {
            margin: 0;
            color: #34495e;
            font-size: 1.2rem;
        }

        #score-live {
            font-weight: bold;
            color: #27ae60;
        }

        #question-text {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 25px;
            white-space: pre-wrap;
        }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            background: #fafafa;
            color: #333;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            background: #ebf5ff;
            border-color: #007bff;
        }

        #start-btn, #result-container button {
            background: #007bff;
            color: white;
            border: none;
            text-align: center;
            font-weight: bold;
        }

        #start-btn:hover, #result-container button:hover {
            background: #0056b3;
        }

        #result-container {
            text-align: center;
        }

        #score-final {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 20px 0;
            color: #2c3e50;

    </style>
</head>
<body>
    <div id="app">
        <h1>Тест: Алгоритмизация и программирование</h1>
        
        <div id="start-container">
            <p style="text-align: center;">Вам будет предложено 40 случайных вопросов из базы.</p>
            <button id="start-btn" onclick="initQuiz()">Начать тест</button>
        </div>

        <div id="quiz-container" style="display: none;">
            <div class="header-info">
                <h2 id="q-num"></h2>
                <span id="score-live">Счет: 0</span>
            </div>
            <p id="question-text"></p>
            <div id="options-container"></div>
        </div>

        <div id="result-container" style="display: none;">
            <h2>Тест завершен!</h2>
            <p id="score-final"></p>
            <button onclick="location.reload()">Пройти заново</button>
        </div>
    </div>

    <script>
        const allQuestions = [
            { q: "1) Что является целью изучения дисциплины «Алгоритмизация и программирование»?", o: ["является изучение теоретических основ программирования и приобретение навыков разработки алгоритмов решения задач, и перевода их в программы", "является изучение артефактов, связанных со сбором, хранением, передачей, обработкой данных средствами вычислительной техники"], a: 0 },
            { q: "2) Какой язык называется языком программирования?", o: ["формальный язык, предназначенный для записи компьютерных программ;", "естественный разговорный язык, на котором люди общаются между собой."], a: 0 },
            { q: "3) Какими из перечисленных свойств должен обладать алгоритм?", o: ["дискретность и конечность", "только простата"], a: 0 },
            { q: "4) Что такое компьютер?", o: ["программно управляемое электронное устройство для обработки информации;", "электронное устройство, предназначенное для автоматизации процессов сбора, хранения, передачи и обработки данных и работающее под управлением программ;", "технически сложное устройство, работающее под управлением человека и предназначенное для арифметических операций."], a: 1 },
            { q: "5) Теоретической основой структурного программирования принято считать:", o: ["принципы, изложенные в классической работе Коррадо Бома и Джузеппе Джакопини (1965);", "структурную теорему Э. Дейкстры «Алгоритм решения любой задача может быть построен с использованием только трех типов вычислительных структур...»", "языки программирования высокого уровня."], a: 0 },
            { q: "6) Структурное программирование", o: ["разрешает использование оператора безусловного перехода GOTO.", "запрещает использование произвольных переходов к метке, за счет чего программа приобретает более упорядоченный характер."], a: 1 },
            { q: "7) Согласно ГОСТ 19.701-90 блоком начала/конца (овал)", o: ["начинается и заканчивается любая процедура, функция;", "из блока всегда выходит стрелка управления.", "тип возвращаемого значения и аргументов функции обычно указывается в комментариях к блоку."], a: 0 },
            { q: "8) Согласно ГОСТ 19.701-90 блок-соединитель (круг) используется", o: ["если блок-схема не умещается на листе;", "отражает переход потока управления между листами;", "не отражает переход потока управления."], a: 0 },
            { q: "9) Что такое алгоритм?", o: ["это набор действий, реализация которых может привести к решению задачи;", "это понятный исполнителю набор правил для решения конкретного множества задач...", "это чётко определённая последовательность действий или инструкций, предназначенная для решения определённой задачи или класса задач."], a: 2 },
            { q: "10) Согласно ГОСТ 19.701-90 Операции ввода/вывода данных (параллелограмм)", o: ["определяется множество символов ввода/вывода, например вывод на дисплеи...", "если источник данных не принципиален, обычно используется символ параллелограмма;", "подробности ввода/вывода не могут быть указаны в комментариях."], a: 1 },
            { q: "11) Какие вычислительные структуры могут входить в алгоритмы решения задач?", o: ["ветвления, цикла, линейная", "только разворота"], a: 0 },
            { q: "12) Что такое операционная система?", o: ["совокупность системных и служебных программ, обеспечивающих доступ пользователя ко всем ресурсам компьютера;", "программа, предназначенная для решения практической задачи пользователя;", "программа, предназначенная для перевода программы пользователя..."], a: 0 },
            { q: "13) Согласно ГОСТ 19.701-90 Вызов внешней процедуры", o: ["вызов внешних процедур и функций помещается в прямоугольник с дополнительными вертикальными линиями.", "вызов внешних процедур помещается в прямоугольник с дополнительными горизонтальными сторонами."], a: 0 },
            { q: "14) Согласно ГОСТ 19.701-90 в Блоке операций (прямоугольник)", o: ["обычно размещают одну или несколько операций присваивания, не требующих вызова внешних функций;", "обычно размещают одну или несколько операций присваивания, требующих вызова внешних функций."], a: 0 },
            { q: "15) Согласно ГОСТ 19.701-90 Блок, иллюстрирующий ветвление алгоритма (ромб) – это", o: ["блок в виде ромба имеет один вход и несколько подписанных выходов;", "блок в виде ромба имеет один вход и один подписанный выход;", "в случае, если блок имеет 2 выхода (соответствует оператору ветвления), на них подписывается результат сравнения — «да/нет»."], a: 2 },
            { q: "16) Современное формальное определение алгоритма было дано в 30 - 50-х гг. XX века в работах математиков:", o: ["Алана Тьюринга, Эмиля Леона Поста, Алонзо Чёрча", "Норберта Винера, Пафнутия Львовича Чебышева"], a: 0 },
            { q: "17) Какими из перечисленных свойств должен обладать правильно составленный алгоритм решения любой задачи?", o: ["конечность, эффективность, понятность, результативность, дискретность", "только дискретность"], a: 0 },
            { q: "18) Процесс создания информационной системы - это", o: ["разработка спецификации программного обеспечения", "эволюция ПО", "все, кроме эволюции ПО (разработка спецификации, проектирование, реализация, аттестация, внедрение)"], a: 2 },
            { q: "19) Процедурное программирование – это", o: ["только возможность повторного использования кода;", "принцип заключается в разбиении сложной задачи на менее сложные подзадачи..."], a: 1 },
            { q: "20) Что такое оператор в программе, написанной на алгоритмическом языке программирования?", o: ["конструкция языка, реализующая какое-то законченное действие;", "конструкция языка определяющее определенное условие;", "ничего из вышеперечисленного."], a: 0 },
            { q: "21) Примером декларативного подхода к программированию являются языки семейства:", o: ["SQL – языки запросов к базам данных...", "BASIC – язык алгоритмического программирования высокого уровня."], a: 0 },
            { q: "22) Преимущества визуального представления программы перед текстовым:", o: ["высокая наглядность и удобство для человека;", "все вышеперечисленное (высокая наглядность, сокращение трудоемкости, повышение качества)."], a: 1 },
            { q: "23) Первым программистом аналитической машины Ч. Бэббиджа, который составил предписание по расчету чисел Бернулли, является:", o: ["леди Ада Лавлейс;", "Якоб Бернулли;", "Чарльз Бэббидж."], a: 0 },
            { q: "24) Основная цель алгоритмизации – это", o: ["составление алгоритмов для электронно-вычислительной машины с дальнейшим решением задачи на компьютере;", "написание программного кода для решения производственной задачи на компьютере;", "создание библиотеки или приложения..."], a: 0 },
            { q: "25) Назовите типы циклических структур:", o: ["циклическая структура со счётчиком, с предусловием, с постусловием", "циклическая структура в цикле."], a: 0 },
            { q: "26) Какими основными свойствами обладает алгоритм?", o: ["только дистрибутивность", "эффективность, определенность, конечность"], a: 1 },
            { q: "27) Какие из перечисленных форм представления алгоритма используются при составлении блок-схем?", o: ["словесная, программная", "графическая"], a: 1 },
            { q: "28) Какие из перечисленных видов алгоритмов соответствуют циклическому алгоритму?", o: ["алгоритм, содержащий хотя бы одну проверку условия, в результате которой выполняется либо одна, либо другая последовательность...", "алгоритм, предусматривающий многократное повторение одной и той же последовательности действий..."], a: 1 },
            { q: "29) Какие из перечисленных видов алгоритмов соответствуют разветвляющемуся алгоритму?", o: ["алгоритм, содержащий хотя бы одну проверку условия, в результате которой выполняется либо одна, либо другая последовательность действий;", "алгоритм, предусматривающий многократное повторение..."], a: 0 },
            { q: "30) Какие из перечисленных видов алгоритмов соответствуют линейному алгоритму?", o: ["это алгоритм, в котором действия выполняются однократно и строго последовательно.", "алгоритм, содержащий хотя бы одну проверку условия..."], a: 0 },
            { q: "31) Информационная система (ИС) — это", o: ["система, предназначенная для хранения, поиска и обработки информации, и соответствующие организационные ресурсы... (ISO/IEC 2382:2015);", "программное обеспечение (программная система), реализующее деловую стратегию организации."], a: 0 },
            { q: "32) Что такое файл?", o: ["поименованный участок электронного носителя данных, где в том или ином формате хранятся данные;", "information processing;", "documentation symbols and conventions..."], a: 0 },
            { q: "33) Идея визуального (графического) программирования сводится к тому, что", o: ["написание программы как текста заменяется в том или ином масштабе ее изображением...", "реализуется тенденция к развитию средств, позволяющих программисту при создании программы оперировать не текстовыми, синтаксическими конструкциями, а графическими образами;"], a: 1 },
            { q: "34) Выберете из предложенных верное определение алгоритма:", o: ["десятичная позиционная система счисления и искусство счета в ней;", "точное описание, которое задаёт вычислительный процесс, начинающийся с произвольного исходного данного и направленный на получение результата;"], a: 1 },
            { q: "35) Выберете верные утверждения:", o: ["блок-схема – это графическая реализация алгоритма;", "блок-схема представляет собой удобный и наглядный способ записи алгоритма;", "верно 1 и 2."], a: 2 },
            { q: "36) Выберете верную классификацию структур данных:", o: ["простые базовые, статические, полустатические, динамические, файловые", "только серверные"], a: 0 },
            { q: "37) Что понимается под объектом в языке программирования VBA?", o: ["это сущность, с которой нельзя взаимодействовать;", "это любая сущность, с которой можно взаимодействовать."], a: 1 },
            { q: "38) В средневековой Европе алгоритмом называлась", o: ["десятичная позиционная система счисления и искусство счета в ней;", "последовательность математических действий в алгебраических расчётах;"], a: 0 },
            { q: "39) В Российской Федерации действует", o: ["ГОСТ 19.701-90 «Схемы алгоритмов программ, данных и систем»;", "ГОСТ 19.701-90 «Схемы программ, данных и систем»;"], a: 0 },
            { q: "40) Верно ли высказывание: «Процедура — блок, который раскрывается в другом месте, а из данной программы лишь вызывается (указанием ее имени)»?", o: ["да;", "нет."], a: 0 },
            { q: "41) Что такое оператор в языке программирования VBA?", o: ["это конструкция языка, определяющая какое-то законченное действие;", "это конструкция языка, изменяющая свое значение в ходе выполнения программы."], a: 0 },
            { q: "42) Что такое процессор?", o: ["является центральным вычислительным элементом (мозгом) любого компьютера, управляет всеми остальными его элементами;", "устройство для хранения программ и данных"], a: 0 },
            { q: "43) В 1938 году немецкий инженер Конрад Цузе построил первую вычислительную электромеханическую машину... а в 1945 году разработал язык:", o: ["Plankalkül (Планкалкюль);", "ALGOL (Алгол);"], a: 0 },
            { q: "44) Благодаря латинскому переводу трактата Аль-Хорезми Algoritmi de numero Indorum... в XII веке Европа познакомилась с позиционной системой счисления, разработанной:", o: ["в Индии;", "в Иране;", "в Греции."], a: 0 },
            { q: "45) На какие классы делится программное обеспечение компьютера?", o: ["системное, прикладное, инструментальное", "только пользовательское"], a: 0 },
            { q: "46) Персидский ученый Абу Абдуллах Мухаммад ибн Муса аль-Хорезми в IX веке в книге «Китаб аль-джебр валь-мукабала» изложил:", o: ["описание придуманной в Индии позиционной десятичной системы счисления;", "впервые использовал цифру 0..."], a: 0 },
            { q: "47) Аналитическая машина Чарльза Бэббиджа (1830г.) была", o: ["первым счётным устройством;", "первым программируемым счетным устройством;", "первым механическим устройством для автоматизации счёта."], a: 1 },
            { q: "48) Автор книги «Программы = Алгоритмы + Структуры»", o: ["Никлаус Вирт;", "Дональд Эрвин Кнут;"], a: 0 },
            { q: "49) Определите вид выделенной алгоритмической структуры (последовательное выполнение Команда 1 -> Команда 2)?", o: ["линейная;", "ветвящаяся;", "циклическая."], a: 0 },
            { q: "50) Язык программирования VBA является:", o: ["предметно-ориентированным языком программирования;", "структурно-ориентированным языком программирования;", "объектно-ориентированным языком программирования."], a: 2 },
            { q: "51) Какое значение будет выведено на экран монитора после выполнения фрагмента VBA:\nX=3\nY=5.5\nIf x > y or x < 5 then z = 2 else z = 3\nMsgbox z", o: ["4", "2", "3"], a: 1 },
            { q: "52) Какое значение будет выведено:\nZ=5\nX=3\nY=5.5\nIf x > y or x < 5 then z = 2 else z = 3\nEnd if\nMsgbox z", o: ["4", "2", "3"], a: 1 },
            { q: "53) Какое значение будет выведено:\nZ=7\nX=3\nY=5.5\nIf x > y and x < 5 then z = 2 end if\nMsgbox z", o: ["7", "2", "3"], a: 0 },
            { q: "54) Какое значение будет выведено:\nZ=5\nX=3\nY=5.5\nIf x > y and x < 5 then z = 2 else z = 4\nend if\nMsgbox z", o: ["4", "2", "3"], a: 0 },
            { q: "55) Какое значение будет выведено:\nx=3\nY=5.5\nIf x > y or x < 5 then z = x + y else z = x - y\nMsgbox z", o: ["8.5", "-2.5", "9"], a: 0 },
            { q: "56) Какое значение будет выведено:\nZ=5, x=3, Y=5.5\nFor k=1 to 10 step 2\nY=y + 1\nNext k\nMsgbox z", o: ["5", "10.5", "8"], a: 0 },
            { q: "57) Какое значение будет выведено:\nZ=5, x=3, Y=5.5\nFor k=1 to 10 step 2\nZ = y + 1\nNext k\nMsgbox z", o: ["8.5", "6.5", "7"], a: 1 },

        let score = 0;
        let currentQuestionIndex = 0;
        let selectedQuestions = [];

        function initQuiz() {
            score = 0;
            currentQuestionIndex = 0;
            document.getElementById('start-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';

            let shuffledQuestions = [...allQuestions].sort(() => 0.5 - Math.random());
            selectedQuestions = shuffledQuestions.slice(0, 40);

            selectedQuestions.forEach(q => {
                let opts = q.o.map((text, i) => ({ text, isCorrect: i === q.a }));
                opts.sort(() => 0.5 - Math.random());
                q.options = opts;
            });

            renderQuestion();
        }

        function renderQuestion() {
            if (currentQuestionIndex >= selectedQuestions.length) {
                showResult();
                return;
            }

            const q = selectedQuestions[currentQuestionIndex];
            document.getElementById('q-num').innerText = `Вопрос ${currentQuestionIndex + 1} из 40`;
            document.getElementById('score-live').innerText = `Счет: ${score}`;
            document.getElementById('question-text').innerText = q.q;

            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(opt.isCorrect);
                optsContainer.appendChild(btn);
            });
        }

        function handleAnswer(isCorrect) {
            if (isCorrect) score++;
            currentQuestionIndex++;
            renderQuestion();
        }

        function showResult() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('score-final').innerText = `Ваш результат: ${score} из 40`;
        }
    </script>
