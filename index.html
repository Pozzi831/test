<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Экзамен: Алгоритмизация и программирование</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
        }

        #app {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 800px;
            width: 100%;
            height: fit-content;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            font-size: 1.4rem;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h2 {
            margin: 0;
            color: #34495e;
            font-size: 1.1rem;
        }

        #score-live {
            font-weight: bold;
            color: #27ae60;
        }

        #question-text {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 10px;
            font-weight: 500;
            white-space: pre-line;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        #question-hint {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 20px;
        }

        .option-btn {
            display: block;
            width: 100%;
            height: auto;
            min-height: 50px;
            padding: 15px;
            margin: 12px 0;
            border: 2px solid #e0e0e0;
            background: #fafafa;
            color: #333;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1.4;
            text-align: left;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            transition: all 0.2s ease;
        }

        .option-btn.selected {
            background: #e8f4ff;
            border-color: #007bff;
            color: #004085;
            font-weight: 600;
            box-shadow: inset 0 0 0 1px #007bff;
        }

        .option-btn.correct {
            background: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724 !important;
            font-weight: 600;
        }

        .option-btn.incorrect {
            background: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24 !important;
            font-weight: 600;
        }

        .primary-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            transition: background 0.2s;
        }

        .primary-btn:hover {
            background: #0056b3;
        }

        #submit-btn {
            background: #28a745;
        }
        
        #submit-btn:hover {
            background: #218838;
        }

        #result-container {
            text-align: center;
        }

        #score-final {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 20px 0;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>Алгоритмизация и программирование</h1>
        
        <div id="start-container">
            <p style="text-align: center; color: #666;">Тестирование состоит из 40 случайных вопросов. Порядок вариантов ответов строго соответствует исходным материалам.</p>
            <button class="primary-btn" onclick="initQuiz()">Начать тест</button>
        </div>

        <div id="quiz-container" style="display: none;">
            <div class="header-info">
                <h2 id="q-num"></h2>
                <span id="score-live">Счет: 0</span>
            </div>
            <p id="question-text"></p>
            <p id="question-hint"></p>
            <div id="options-container"></div>
            
            <button id="submit-btn" class="primary-btn" style="display: none;" onclick="handleButtonClick()">Ответить</button>
        </div>

        <div id="result-container" style="display: none;">
            <h2>Тест завершен!</h2>
            <p id="score-final"></p>
            <button class="primary-btn" onclick="location.reload()">Пройти заново</button>
        </div>
    </div>

    <script>
        const allQuestions = [
            { q: "1) Что является целью изучения дисциплины «Алгоритмизация и программирование»?", o: ["является изучение теоретических основ программирования и приобретение навыков разработки алгоритмов решения задач, и перевода их в программы, составленные в современной высокотехнологичной среде разработчика;", "является изучение артефактов, связанных со сбором, хранением, передачей, обработкой данных средствами вычислительной техники, а так же изучение истории развития вычислительной техники."], a: 0 },
            { q: "2) Какой язык называется языком программирования?", o: ["формальный язык, предназначенный для записи компьютерных программ;", "естественный разговорный язык, на котором люди общаются между собой."], a: 0 },
            { q: "3) Какими из перечисленных свойств должен обладать алгоритм?", o: ["дискретность;", "простата;", "конечность."], a: [0, 2] },
            { q: "4) Что такое компьютер?", o: ["программно управляемое электронное устройство для обработки информации;", "электронное устройство, предназначенное для автоматизации процессов сбора, хранения, передачи и обработки данных и работающее под управлением программ;", "технически сложное устройство, работающее под управлением человека и предназначенное для выполнения арифметических и логических операций над числовыми данными."], a: 1 },
            { q: "5) Теоретической основой структурного программирования принято считать:", o: ["принципы, изложенные в классической работе Коррадо Бома и Джузеппе Джакопини (1965);", "структурную теорему Э. Дейкстры «Алгоритм решения любой задачи может быть построен с использованием только трех типов вычислических структур — линейного, ветвления и циклического»;", "языки программирования высокого уровня."], a: 1 },
            { q: "6) Структурное программирование", o: ["разрешает использование оператора безусловного перехода GOTO.", "запрещает использование произвольных переходов к метке, за счет чего программа приобретает более упорядоченный характер."], a: 1 },
            { q: "7) Согласно ГОСТ 19.701-90 блоком начала/конца", o: ["начинается и заканчивается любая процедура, функция;", "из блока всегда выходит стрелка управления.", "тип возвращаемого значения и аргументов функции обычно указывается в комментариях к блоку."], a: 0 },
            { q: "8) Согласно ГОСТ 19.701-90 блок-соединитель используется", o: ["если блок-схема не умещается на листе;", "отражает переход потока управления между листами;", "не отражает переход потока управления между листами с графическим изображением блок-схемы."], a: 0 },
            { q: "9) Что такое алгоритм?", o: ["это набор действий, реализация которых может привести к решению задачи;", "это понятный исполнителю набор правил для решения конкретного множества задач;", "это чётко определённая последовательность действий или инструкций, предназначенная для решения определённой задачи или класса задач."], a: 2 },
            { q: "10) Согласно ГОСТ 19.701-90 Операции ввода/вывода данных (параллелограмм)", o: ["определяется множество символов ввода/вывода, например вывод на дисплеи, магнитные ленты и другие устройства компьютера;", "если источник данных не принципиален, обычно используется символ параллелограмма;", "подробности ввода/вывода не могут быть указаны в комментариях."], a: [0, 1] },
            { q: "11) Какие вычислительные структуры могут входить в алгоритмы решения задач?", o: ["ветвления;", "разворота;", "цикла;", "линейная."], a: [0, 2, 3] },
            { q: "12) Что такое операционная система?", o: ["совокупность системных и служебных программ, обеспечивающих доступ пользователя ко всем ресурсам компьютера;", "программа, предназначенная для решения практической задачи пользователя;", "программа, предназначенная для перевода программы пользователя, написанной на языке высокого уровня в программу, написанную в машинных кодах."], a: 0 },
            { q: "13) Согласно ГОСТ 19.701-90 Вызов внешней процедуры", o: ["вызов внешних процедур и функций помещается в прямоугольник с дополнительными вертикальными линиями;", "вызов внешних процедур помещается в прямоугольник с дополнительными горизонтальными сторонами."], a: 0 },
            { q: "14) Согласно ГОСТ 19.701-90 в Блоке операций (прямоугольник)", o: ["обычно размещают одну или несколько операций присваивания, не требующих вызова внешних функций;", "обычно размещают одну или несколько операций присваивания, требующих вызова внешних функций."], a: 0 },
            { q: "15) Согласно ГОСТ 19.701-90 Блок, иллюстрирующий ветвление алгоритма (ромб) – это", o: ["блок в виде ромба имеет один вход и несколько подписанных выходов;", "блок в виде ромба имеет один вход и один подписанный выход;", "в случае, если блок имеет 2 выхода (соответствует оператору ветвления), на них подписывается результат сравнения — «да/нет»."], a: [0, 2] },
            { q: "16) Современное формальное определение алгоритма было дано в 30 - 50-х гг. XX века в работах математиков:", o: ["Алана Тьюринга;", "Эмиля Леона Поста;", "Алонзо Чёрча;", "Норберта Винера;", "Пафнутия Львовича Чебышева."], a: [0, 1, 2] },
            { q: "17) Какими из перечисленных свойств должен обладать правильно составленный алгоритм решения любой задачи?", o: ["конечность;", "эффективность;", "понятность;", "результативность;", "дискретность."], a: [0, 1, 2, 3, 4] },
            { q: "18) Процесс создания информационной системы - это", o: ["разработка спецификации программного обеспечения;", "проектирование;", "реализация;", "аттестация;", "внедрение;", "все, кроме 4."], a: 5 },
            { q: "19) Процедурное программирование – это", o: ["программирование с использованием процедур;", "принцип заключается в разбиении сложной задачи на менее сложные подзадачи, каждая из которых либо также разбивается на еще более простые, либо решается доступными средствами;", "возможность повторного использования кода;", "все, кроме 2."], a: 3 },
            { q: "20) Что такое оператор в программе, написанной на алгоритмическом языке программирования?", o: ["конструкция языка, реализующая какое-то законченное действие;", "конструкция языка определяющее определенное условие;", "ничего из вышеперечисленного."], a: 0 },
            { q: "21) Примером декларативного подхода к программированию являются языки семейства:", o: ["SQL – языки запросов к базам данных, в которых описывается, что нам надо извлечь из базы, а система управления базой данных сама осуществляет все необходимые для этого действия;", "BASIC – язык алгоритмического программирования высокого уровня."], a: 0 },
            { q: "22) Преимущества визуального представления программы перед текстовым:", o: ["высокая наглядность и удобство для человека;", "сокращение трудоемкости разработки;", "повышение качества программного обеспечения;", "все вышеперечисленное."], a: 3 },
            { q: "23) Первым программистом аналитической машины Ч. Бэббиджа, который составил предписание по расчету чисел Бернулли, является:", o: ["леди Ада Лавлейс;", "Якоб Бернулли;", "Чарльз Бэббидж."], a: 0 },
            { q: "24) Основная цель алгоритмизации – это", o: ["составление алгоритмов для электронно-вычислительной машины с дальнейшим решением задачи на компьютере;", "написание программного кода для решения производственной задачи на компьютере;", "создание библиотеки или приложения."], a: 0 },
            { q: "25) Назовите типы циклических структур:", o: ["циклическая структура со счётчиком;", "циклическая структура с предусловием;", "циклическая структура с постусловием;", "циклическая структура в цикле."], a: [0, 1, 2] },
            { q: "26) Какими основными свойствами обладает алгоритм?", o: ["эффективность – возможность исполнения предписаний за конечное время;", "определенность (точность, однозначность);", "конечность;", "дистрибутивность."], a: [0, 1, 2] },
            { q: "27) Какие из перечисленных форм представления алгоритма используются при составлении блок-схем?", o: ["словесная;", "графическая;", "псевдокоды;", "программная."], a: 1 },
            { q: "28) Какие из перечисленных видов алгоритмов соответствуют циклическому алгоритму?", o: ["алгоритм, в котором действия выполняются однократно и строго последовательно.", "алгоритм, содержащий хотя бы одну проверку условия, в результате которой выполняется либо одна, либо другая последовательность действий;", "алгоритм, предусматривающий многократное повторение одной и той же последовательности действий. Количество повторений зависит от исходных данных или условия задачи."], a: 2 },
            { q: "29) Какие из перечисленных видов алгоритмов соответствуют разветвляющемуся алгоритму?", o: ["это алгоритм, в котором действия выполняются однократно и строго последовательно.", "алгоритм, содержащий хотя бы одну проверку условия, в результате которой выполняется либо одна, либо другая последовательность действий;", "алгоритм, предусматривающий многократное повторение одной и той же последовательности действий. Количество повторений зависит от исходных данных или условия задачи."], a: 1 },
            { q: "30) Какие из перечисленных видов алгоритмов соответствуют линейному алгоритму?", o: ["это алгоритм, в котором действия выполняются однократно и строго последовательно.", "алгоритм, содержащий хотя бы одну проверку условия, в результате которой выполняется либо одна, либо другая последовательность действий;", "алгоритм, предусматривающий многократное повторение одной и той же последовательности действий."], a: 0 },
            { q: "31) Информационная система (ИС) — это", o: ["система, предназначенная для хранения, поиска и обработки информации, и соответствующие организационные ресурсы (человеческие, технические, финансовые и т. д.), которые обеспечивают и распространяют информацию (ISO/IEC 2382:2015);", "программное обеспечение (программная система), реализующее деловую стратегию организации."], a: 0 },
            { q: "32) Что такое файл?", o: ["поименованный участок электронного носителя данных, где в том или ином формате хранятся данные;", "поименованный участок внешнего носителя, где в том или ином формате хранятся данные;", "совокупность символов и соглашений для документирования."], a: 1 },
            { q: "33) Идея визуального (графического) программирования сводится к тому, что", o: ["написание программы как текста заменяется ее изображением в виде графической диаграммы;", "реализуется тенденция к развитию средств, позволяющих программисту при создании программы оперировать не текстовыми, синтаксическими конструкциями, а графическими образами;", "традиционный термин «писать программу» трансформируется в «построить, спроектировать программу»."], a: [0, 1, 2] },
            { q: "34) Выберете из предложенных верное определение алгоритма:", o: ["десятичная позиционная система счисления и искусство счета в ней;", "точное описание, которое задаёт вычислительный процесс, начинающийся с произвольного исходного данного и направленный на получение полностью определенного этими исходными данными результата;", "решение задач в виде точных последовательно выполняемых предписаний."], a: 1 },
            { q: "35) Выберете верные утверждения:", o: ["блок-схема – это графическая реализация алгоритма;", "блок-схема представляет собой удобный и наглядный способ записи алгоритма.", "блок-схема состоит из функциональных блоков разной формы, связанных между собой линиями со стрелками, в каждом блоке описывается одно или несколько действий.", "верно 1 и 2."], a: 3 },
            { q: "36) Выберете верную классификацию структур данных:", o: ["простые базовые;", "статические;", "полустатические;", "серверные;", "динамические;", "файловые."], a: [0, 1, 2, 4, 5] },
            { q: "37) Что понимается под объектом в языке программирования VBA?", o: ["это сущность, с которой нельзя взаимодействовать;", "это любая сущность, с которой можно взаимодействовать."], a: 1 },
            { q: "38) В средневековой Европе алгоритмом называлась", o: ["десятичная позиционная система счисления и искусство счета в ней;", "последовательность математических действий в алгебраических расчётах;", "Римская не позиционная система счисления и искусство счета в ней."], a: 0 },
            { q: "39) В Российской Федерации действует", o: ["ГОСТ 19.701-90 «Схемы программ, данных и систем»;", "ГОСТ 19.701-90 «Схемы алгоритмов программ, данных и систем»;", "ГОСТ 19.701-90 «Схемы алгоритмов программ, данных, систем и технологий»."], a: 1 },

            { q: "41) Что такое оператор в языке программирования VBA?", o: ["это конструкция языка, определяющая какое-то законченное действие;", "это конструкция языка, изменяющая свое значение в ходе выполнения программы."], a: 0 },

        let score = 0;
        let currentQuestionIndex = 0;
        let selectedQuestions = [];
        let userSelectedIndices = new Set();
        let hasAnswered = false;

        function initQuiz() {
            score = 0;
            currentQuestionIndex = 0;
            hasAnswered = false;
            userSelectedIndices.clear();
            
            document.getElementById('start-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';

            let shuffledQuestions = [...allQuestions].sort(() => 0.5 - Math.random());
            selectedQuestions = shuffledQuestions.slice(0, 40);

            selectedQuestions.forEach(q => {
                q.options = q.o.map((text, index) => {
                    let isCorrect = Array.isArray(q.a) ? q.a.includes(index) : index === q.a;
                    return { text: text, isCorrect: isCorrect };
                });
            });

            renderQuestion();
        }

        function renderQuestion() {
            if (currentQuestionIndex >= selectedQuestions.length) {
                showResult();
                return;
            }

            hasAnswered = false;
            const q = selectedQuestions[currentQuestionIndex];
            document.getElementById('q-num').innerText = `Вопрос ${currentQuestionIndex + 1} из 40`;
            document.getElementById('score-live').innerText = `Счет: ${score}`;
            document.getElementById('question-text').innerText = q.q;

            const isMultiple = Array.isArray(q.a);
            document.getElementById('question-hint').innerText = isMultiple ? "(Можно выбрать несколько вариантов ответа)" : "(Выберите один вариант ответа)";

            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';
            
            userSelectedIndices.clear();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = 'Ответить';
            submitBtn.style.display = 'none';

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => toggleOption(btn, index);
                optsContainer.appendChild(btn);
            });
        }

        function toggleOption(btnElement, index) {
            if (hasAnswered) return;

            const q = selectedQuestions[currentQuestionIndex];
            const isMultiple = Array.isArray(q.a);

            if (isMultiple) {
                if (userSelectedIndices.has(index)) {
                    userSelectedIndices.delete(index);
                    btnElement.classList.remove('selected');
                } else {
                    userSelectedIndices.add(index);
                    btnElement.classList.add('selected');
                }
            } else {
                userSelectedIndices.clear();
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(btn => btn.classList.remove('selected'));
                
                userSelectedIndices.add(index);
                btnElement.classList.add('selected');
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.style.display = userSelectedIndices.size > 0 ? 'block' : 'none';
        }

        function handleButtonClick() {
            if (!hasAnswered) {
                submitAnswer();
            } else {
                nextQuestion();
            }
        }

        function submitAnswer() {
            hasAnswered = true;
            const q = selectedQuestions[currentQuestionIndex];
            
            let isPerfectMatch = true;
            for (let i = 0; i < q.options.length; i++) {
                const isSelectedByUser = userSelectedIndices.has(i);
                const isCorrectOption = q.options[i].isCorrect;
                
                if (isSelectedByUser !== isCorrectOption) {
                    isPerfectMatch = false;
                    break;
                }
            }

            if (isPerfectMatch) {
                score++;
                document.getElementById('score-live').innerText = `Счет: ${score}`;
            }

            const buttons = document.querySelectorAll('.option-btn');
            q.options.forEach((opt, i) => {
                const btn = buttons[i];
                btn.classList.remove('selected');
                if (opt.isCorrect) {
                    btn.classList.add('correct');
                } else if (userSelectedIndices.has(i)) {
                    btn.classList.add('incorrect');
                }
            });

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = 'Далее';
            submitBtn.style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            renderQuestion();
        }

        function showResult() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('score-final').innerText = `Ваш результат: ${score} из 40`;
        }
    </script>
