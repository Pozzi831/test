<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экзамен: Алгоритмизация и программирование</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Тест: Алгоритмизация и программирование</h1>
        
        <div id="start-container">
            <p>Вам будет предложено 40 случайных вопросов из базы.</p>
            <button id="start-btn" onclick="initQuiz()">Начать тест</button>
        </div>

        <div id="quiz-container" style="display: none;">
            <div class="header-info">
                <h2 id="q-num"></h2>
                <span id="score-live">Счет: 0</span>
            </div>
            <p id="question-text"></p>
            <div id="options-container"></div>
        </div>

        <div id="result-container" style="display: none;">
            <h2>Тест завершен!</h2>
            <p id="score-final"></p>
            <button onclick="location.reload()">Пройти заново</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
